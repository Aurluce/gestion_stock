<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <linearGradient id="topbarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="900" height="600" fill="#F0F0F0" rx="8"/>

  <!-- SIDEBAR -->
  <g filter="url(#shadow)">
    <rect x="10" y="10" width="200" height="580" rx="6" fill="url(#sidebarGrad)" stroke="#E0E0E0" stroke-width="1"/>
  </g>

  <!-- Sidebar Header -->
  <rect x="10" y="10" width="200" height="50" rx="6" fill="#0078D4"/>
  <rect x="10" y="34" width="200" height="26" fill="#0078D4"/>
  <text x="40" y="42" font-size="14" font-weight="bold" fill="white">📦 Gestion Stock</text>
  <line x1="10" y1="60" x2="210" y2="60" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Sidebar Section Navigation -->
  <text x="25" y="80" font-size="10" font-weight="600" fill="#999" letter-spacing="1">NAVIGATION</text>

  <!-- Sidebar Items -->
  <g>
    <rect x="15" y="88" width="190" height="32" rx="6" fill="#E3F2FD"/>
    <text x="42" y="108" font-size="13" fill="#1565C0" font-weight="500">📊 Dashboard</text>
  </g>
  <g>
    <rect x="15" y="124" width="190" height="32" rx="6" fill="transparent"/>
    <text x="42" y="144" font-size="13" fill="#4D4D4D">🏷️ Produits</text>
  </g>
  <g>
    <rect x="15" y="160" width="190" height="32" rx="6" fill="transparent"/>
    <text x="42" y="180" font-size="13" fill="#4D4D4D">📁 Familles</text>
  </g>
  <g>
    <rect x="15" y="196" width="190" height="32" rx="6" fill="transparent"/>
    <text x="42" y="216" font-size="13" fill="#4D4D4D">🚚 Fournisseurs</text>
  </g>
  <g>
    <rect x="15" y="232" width="190" height="32" rx="6" fill="transparent"/>
    <text x="42" y="252" font-size="13" fill="#4D4D4D">👥 Clients</text>
  </g>

  <!-- Sidebar Section Approvisionnements -->
  <text x="25" y="280" font-size="10" font-weight="600" fill="#999" letter-spacing="1">APPROVISIONNEMENTS</text>
  <g><rect x="15" y="288" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="306" font-size="13" fill="#4D4D4D">📄 Commandes fourn.</text></g>
  <g><rect x="15" y="320" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="338" font-size="13" fill="#4D4D4D">🧾 Factures fourn.</text></g>

  <!-- Sidebar Section Ventes -->
  <text x="25" y="372" font-size="10" font-weight="600" fill="#999" letter-spacing="1">VENTES</text>
  <g><rect x="15" y="380" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="398" font-size="13" fill="#4D4D4D">🛒 Commandes clients</text></g>
  <g><rect x="15" y="412" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="430" font-size="13" fill="#4D4D4D">💰 Factures clients</text></g>

  <!-- Sidebar Section Utilisateurs -->
  <text x="25" y="464" font-size="10" font-weight="600" fill="#999" letter-spacing="1">UTILISATEURS</text>
  <g><rect x="15" y="472" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="490" font-size="13" fill="#4D4D4D">👤 Utilisateurs</text></g>
  <g><rect x="15" y="504" width="190" height="28" rx="6" fill="transparent"/><text x="42" y="522" font-size="13" fill="#4D4D4D">📋 Journal audit</text></g>

  <!-- Sidebar Footer -->
  <line x1="10" y1="545" x2="210" y2="545" stroke="#E0E0E0" stroke-width="1"/>
  <text x="80" y="572" font-size="11" fill="#999">v1.0.0</text>

  <!-- LABEL SIDEBAR -->
  <rect x="10" y="585" width="200" height="18" rx="3" fill="#E3F2FD"/>
  <text x="75" y="597" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="600">SIDEBAR (256px)</text>

  <!-- ==================== MAIN CONTENT AREA ==================== -->

  <!-- TOPBAR -->
  <g filter="url(#shadow)">
    <rect x="220" y="10" width="670" height="52" rx="6" fill="url(#topbarGrad)" stroke="#E0E0E0" stroke-width="1"/>
  </g>

  <!-- Topbar left -->
  <text x="240" y="44" font-size="14" fill="#4D4D4D">☰</text>
  <text x="262" y="44" font-size="13" fill="#999">Accueil</text>
  <text x="310" y="44" font-size="11" fill="#CCC">›</text>
  <text x="322" y="44" font-size="13" fill="#666">Utilisateurs</text>

  <!-- Topbar right -->
  <circle cx="790" cy="36" r="14" fill="#0078D4"/>
  <text x="790" y="40" font-size="11" fill="white" text-anchor="middle" font-weight="bold">AR</text>
  <text x="810" y="38" font-size="13" fill="#333" font-weight="500">Arsène</text>
  <text x="850" y="28" font-size="11" fill="#999">Connecté</text>

  <!-- TOPBAR LABEL -->
  <rect x="220" y="585" width="670" height="18" rx="3" fill="#FFF8E1"/>
  <text x="555" y="597" font-size="10" fill="#E65100" text-anchor="middle" font-weight="600">TOPBAR (56px)</text>

  <!-- CONTENT AREA -->
  <g filter="url(#shadow)">
    <rect x="220" y="70" width="670" height="508" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  </g>

  <!-- Page Header -->
  <text x="240" y="98" font-size="20" font-weight="bold" fill="#242424">Gestion des utilisateurs</text>
  <rect x="700" y="82" width="70" height="28" rx="6" fill="#0078D4"/>
  <text x="735" y="100" font-size="12" fill="white" text-anchor="middle" font-weight="500">➕ Ajouter</text>
  <rect x="780" y="82" width="90" height="28" rx="6" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <text x="825" y="100" font-size="12" fill="#333" text-anchor="middle">👥 Groupes</text>

  <!-- Card: Formulaire -->
  <rect x="240" y="120" width="630" height="140" rx="6" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="255" y="140" font-size="13" font-weight="600" fill="#333">📝 Ajouter un utilisateur</text>
  <rect x="255" y="152" width="140" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="260" y="172" font-size="10" fill="#666">Nom complet</text>
  <rect x="405" y="152" width="140" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="410" y="172" font-size="10" fill="#666">Identifiant</text>
  <rect x="555" y="152" width="140" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="560" y="172" font-size="10" fill="#666">Mot de passe</text>
  <rect x="255" y="195" width="140" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="260" y="215" font-size="10" fill="#666">Groupe</text>
  <rect x="555" y="195" width="140" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="560" y="215" font-size="10" fill="#666">Expiration MDP</text>
  <rect x="255" y="197" width="20" height="20" rx="4" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="280" y="213" font-size="12" fill="#333">Actif</text>
  <rect x="580" y="235" width="130" height="28" rx="6" fill="#0078D4"/>
  <text x="645" y="253" font-size="12" fill="white" text-anchor="middle">💾 Créer</text>

  <!-- Tableau -->
  <line x1="240" y1="275" x2="870" y2="275" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4"/>
  <rect x="240" y="280" width="630" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Table header -->
  <rect x="240" y="280" width="630" height="36" rx="6" fill="#F5F5F5"/>
  <text x="260" y="303" font-size="11" font-weight="600" fill="#666">ID</text>
  <text x="310" y="303" font-size="11" font-weight="600" fill="#666">NOM COMPLET</text>
  <text x="470" y="303" font-size="11" font-weight="600" fill="#666">IDENTIFIANT</text>
  <text x="600" y="303" font-size="11" font-weight="600" fill="#666">GROUPE</text>
  <text x="700" y="303" font-size="11" font-weight="600" fill="#666">STATUT</text>
  <text x="800" y="303" font-size="11" font-weight="600" fill="#666">ACTIONS</text>

  <!-- Table rows -->
  <line x1="240" y1="316" x2="870" y2="316" stroke="#E0E0E0" stroke-width="1"/>
  <text x="260" y="336" font-size="12" fill="#333">#1</text>
  <text x="310" y="336" font-size="12" fill="#333">Jean Dupont</text>
  <text x="470" y="336" font-size="12" fill="#333">jdupont</text>
  <text x="600" y="336" font-size="12" fill="#333">Admin</text>
  <rect x="700" y="326" width="50" height="18" rx="9" fill="#E8F5E9"/>
  <text x="725" y="338" font-size="10" fill="#2E7D32" text-anchor="middle">Actif</text>
  <text x="810" y="336" font-size="12" fill="#999">✏️ 🗑️</text>

  <line x1="240" y1="348" x2="870" y2="348" stroke="#E0E0E0" stroke-width="1"/>
  <text x="260" y="368" font-size="12" fill="#333">#2</text>
  <text x="310" y="368" font-size="12" fill="#333">Marie Claire</text>
  <text x="470" y="368" font-size="12" fill="#333">mclaire</text>
  <text x="600" y="368" font-size="12" fill="#333">Vendeur</text>
  <rect x="700" y="358" width="50" height="18" rx="9" fill="#E8F5E9"/>
  <text x="725" y="370" font-size="10" fill="#2E7D32" text-anchor="middle">Actif</text>
  <text x="810" y="368" font-size="12" fill="#999">✏️ 🗑️</text>

  <line x1="240" y1="380" x2="870" y2="380" stroke="#E0E0E0" stroke-width="1"/>
  <text x="260" y="400" font-size="12" fill="#333">#3</text>
  <text x="310" y="400" font-size="12" fill="#333">Paul Biya</text>
  <text x="470" y="400" font-size="12" fill="#333">pbiya</text>
  <text x="600" y="400" font-size="12" fill="#333">Admin</text>
  <rect x="700" y="390" width="60" height="18" rx="9" fill="#FFEBEE"/>
  <text x="730" y="402" font-size="10" fill="#C62828" text-anchor="middle">Inactif</text>
  <text x="810" y="400" font-size="12" fill="#999">✏️ 🗑️</text>

  <!-- Pagination -->
  <text x="450" y="500" font-size="12" fill="#999">‹ 1 2 3 4 5 ›</text>

  <!-- CONTENT LABEL -->
  <rect x="220" y="548" width="670" height="24" rx="3" fill="#E8F5E9"/>
  <text x="555" y="564" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="600">CONTENT (flex-1, overflow-y-auto, p-6)</text>

  <!-- Légende structurelle -->
  <g transform="translate(10, 540)">
    <rect x="0" y="0" width="0" height="0"/>
  </g>
</svg>
